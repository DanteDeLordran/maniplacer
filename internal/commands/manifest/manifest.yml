apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{  }}
  name: {{  }}
spec:
  progressDeadlineSeconds: 600
  replicas: {{  }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: {{  }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{  }}
    spec:
      containers:
      - image: {{  }}
        imagePullPolicy: Always
        name: {{  }}
        envFrom:
        - secretRef:
          name: {{  }}
        resources:
            limits:
              cpu: 700m
              memory: 1Gi
            requests:
              cpu: 70m
              memory: 20Mi
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: {{  }}
            port: {{  }}
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: {{  }}
        readinessProbe:
          httpGet:
            path: {{  }}
            port: {{  }}
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: {{  }}
          successThreshold: 1
          periodSeconds: 30
        ports:
          - containerPort: {{  }}
            name: http
            protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        # volumeMounts:
        # - mountPath: /sysx/progs/application.properties
        #   name: auth-service-config
        #   subPath: application.properties
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
